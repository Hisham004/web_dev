<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>  
     <div class="form">
           
            
        <form action="">
            <h1 id="login">Login Here</h1>
            <label>Name <sup>*</sup></label>
            <input placeholder="Enter Your name" type="text"><br><br>
            <label >Mobile Number <sp>*</sp></label>
            <input placeholder="Enter Your Mobile Number" type="tel"><br><br>
            <label >Date of Birth</label>
            <input placeholder="Enter Your Date of Birth" type="date"><br><br>
            <label >Email <sp>*</sp></label>
            <input placeholder="Enter Your Email" type="email"><br><br>
            <button type="submit">Register</button>  
        </form>    
    </div>
</body>
</html>
