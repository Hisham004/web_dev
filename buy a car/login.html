<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
         body{
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            height: 100vh;

            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input{
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding-left: 25%;
        }
        form{
            height: 75vh;
            width: 100vh;
            background-image: url(https://images.unsplash.com/photo-1629897045592-3629125e0353?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
           

            border: 2px;
            border-color: black;
            border-radius: 10px;
            border-style: solid;
            padding-top: 10px;
            
        }
       
        h1{
            color: rgb(9, 0, 0);
            font-style: italic;
            text-align: center;
            padding-top: 60px;
        }
        .input label{
            width: 90px;
            color: rgb(30, 3, 3);
        }
        .input input{
            border-style: solid;
            border-color: white;
            border-radius: 5px;
        }
        button{
            text-align: center;
            align-items: center;
            margin-left: 250px;
            border: 2px;
            border-style: solid;
            border-color: white;
            border-radius: 5px;
        }
        

    </style>
</head>
<body>   
        <form action="">
            <div class="all">
                <h1 id="login">Login Here</h1>
                <div class="input">  
                    <label>Name <sup>*</sup></label>
                    <input placeholder="Enter Your name" type="text"><br><br>
                </div>
                <div class="input">  
                    <label >Mobile No. <sp>*</sp></label>
                    <input placeholder="Enter Your Mobile Number" type="tel"><br><br>
                </div>
                <div class="input">      
                    <label >Email <sp>*</sp></label>
                    <input placeholder="Enter Your Email" type="email"><br><br>
                </div>
                <button type="submit">Register</button>
            </div>
        </form>    
    
</body>
</html>
