<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>productcard</title>
    <style>
        body{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            height: 100vh;
            background-color: wheat;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;


        }
        .product{
            border: 2px;
            border-color: rgb(7, 7, 7);
            border-style: solid;
            border-radius: 10px;
            margin-bottom: 10px;

            padding: 12px;


            text-align: center;
            box-shadow: 4px 4px 8px black;
        }
        .product h2{
            border-bottom: 1px solid black;
        }

        .product img{
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .product button{
            background-color: rgb(31, 22, 22);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;

        }

    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bGFwdG9wfGVufDB8fDB8fHww" height="150px" width="150px">
        <h2>LAPTOPS</h2>
        <p>PRICE : 79999</p>
        <button>Buy Now</button>
        <button>Add to cart</button>
    </div>

     <div class="product">
        <img src="https://images.unsplash.com/photo-1605236453806-6ff36851218e?q=80&w=464&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" height="150px" width="150px">
        <h2>MOBILES</h2>
        <p>PRICE : 20000</p>
        <button>Buy Now</button>
        <button>Add to cart</button>
    </div>

     <div class="product">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" height="150px" width="150px">
        <h2>WIRELESS HEADPHONES</h2>
        <p>PRICE:1000</p>
        <button>Buy Now</button>
        <button>Add to cart</button>
    </div>

     <div class="product">
        <img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8a2V5Ym9hcmR8ZW58MHx8MHx8fDA%3D" height="150px" width="150px">
        <h2>KEYBOARD</h2>
        <p>PRICE : 599</p>
        <button>Buy Now</button>
        <button>Add to cart</button>
    </div>
</body>
</html>
